context_hint: |
  This document is a payment receipt or proof of payment. Extract all 14 payment
  fields precisely from the receipt, including receipt number, payment details,
  and any stamp or signature annotations.
  Return ONLY valid JSON. No prose. The JSON must conform to the extraction schema.

field_hints:
  customer_name: "Full name of the payer or customer as printed on the receipt."
  account_number: "Bank account number. Include all digits exactly as shown."
  payee: "Name of the payment recipient, cashier, or organisation issuing the receipt."
  payment_id: "Receipt number, transaction ID, or authorisation code."
  payment_method: "Payment method: EFT, CASH, CHEQUE, DIRECT_DEPOSIT, or CARD."
  payment_date: "Payment date in any format. Will be normalised to YYYY-MM-DD."
  invoice_number: "Invoice or original document number referenced on the receipt."
  reference_doc_number: "Additional reference or batch number if present on the receipt."
  amount_paid: "Total amount received as a numeric value. CRITICAL — must not be null."
  currency: "ISO 4217 currency code or symbol (e.g. ZAR, USD, $)."
  deductions: "Any discounts or deductions applied, as a numeric value."
  deduction_type: "Reason or type for any deductions noted on the receipt."
  notes: "Any additional remarks, stamps, or annotations on the receipt."

confidence_thresholds:
  customer_name: 0.75
  account_number: 0.80
  payee: 0.75
  payment_id: 0.70
  payment_method: 0.75
  payment_date: 0.80
  invoice_number: 0.70
  reference_doc_number: 0.70
  amount_paid: 0.90   # Must be >= 0.85 — see research.md §Decision 11
  currency: 0.75
  deductions: 0.70
  deduction_type: 0.70
  notes: 0.70

required_fields:
  - amount_paid
