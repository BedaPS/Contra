context_hint: |
  This document is an email payment notification or remittance email. Extract all 14
  payment fields precisely from the email body and any inline tables.
  Look for payment confirmations, EFT notifications, or bank transfer details.
  Return ONLY valid JSON. No prose. The JSON must conform to the extraction schema.

field_hints:
  customer_name: "Full name of the payer or sender as printed in the email."
  account_number: "Bank account number. Include all digits exactly as shown."
  payee: "Name of the payment recipient / payee or beneficiary."
  payment_id: "Any unique transaction reference, payment ID, or confirmation number."
  payment_method: "Payment method: EFT, CASH, CHEQUE, DIRECT_DEPOSIT, or CARD."
  payment_date: "Payment date in any format. Will be normalised to YYYY-MM-DD."
  invoice_number: "Invoice or document number referenced in the email."
  reference_doc_number: "Additional reference document number if present."
  amount_paid: "Total payment amount as a numeric value. CRITICAL — must not be null."
  currency: "ISO 4217 currency code or symbol (e.g. ZAR, USD, $)."
  deductions: "Any deductions or adjustments in numeric value."
  deduction_type: "Reason or type for any deductions (e.g. early payment discount)."
  notes: "Any additional notes, remarks, or comments in the email body."

confidence_thresholds:
  customer_name: 0.75
  account_number: 0.80
  payee: 0.75
  payment_id: 0.70
  payment_method: 0.75
  payment_date: 0.80
  invoice_number: 0.70
  reference_doc_number: 0.70
  amount_paid: 0.90   # Must be >= 0.85 — see research.md §Decision 11
  currency: 0.75
  deductions: 0.70
  deduction_type: 0.70
  notes: 0.70

required_fields:
  - amount_paid
